<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عبد العزيز قرينيك</title>

<style>
:root{
  --black:#0a0a0a;
  --gold:#d4af37;
  --accent:#1f2937;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--black);
  color:white;
}

/* Header */
header{
  padding:20px;
  text-align:center;
  color:var(--gold);
  border-bottom:1px solid var(--gold);
}

/* Language */
.lang{
  position:absolute;
  top:10px;
  right:10px;
}

/* Products */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:var(--accent);
  padding:15px;
  border-radius:15px;
  border:1px solid var(--gold);
  transition:.3s;
}
.card:hover{transform:scale(1.03);}

img{width:100%;border-radius:10px;}

button{
  background:var(--gold);
  border:none;
  padding:10px;
  margin-top:10px;
  cursor:pointer;
}

/* Cart */
.cart-btn{
  position:fixed;
  right:10px;
  top:50%;
  background:var(--gold);
  padding:15px;
  cursor:pointer;
}

.cart{
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:#111;
  display:none;
  padding:20px;
  overflow:auto;
}

/* Admin */
.admin-btn{
  position:fixed;
  left:10px;
  bottom:10px;
  background:var(--gold);
  padding:10px;
  cursor:pointer;
}

/* Footer */
footer{
  text-align:center;
  padding:20px;
  border-top:1px solid var(--gold);
  color:var(--gold);
}
</style>
</head>

<body>

<div class="lang">
<select onchange="changeLang(this.value)">
<option value="ar">AR</option>
<option value="fr">FR</option>
<option value="en">EN</option>
</select>
</div>

<header id="title">
صاحب الموقع عبد العزيز قرينيك<br>
محل متواجد في ولاية النعامة - عين الصفراء<br>
توصيل إلى جميع ولايات الوطن 🇩🇿
</header>

<div class="container" id="products"></div>

<div class="cart-btn" onclick="toggleCart()">🛒</div>

<div class="cart" id="cart">
<h3>السلة</h3>
<ul id="cartItems"></ul>
<p id="total"></p>

<button onclick="sendOrder()">إرسال الطلب</button>
</div>

<div class="admin-btn" onclick="adminLogin()">⚙️</div>

<footer id="footer">
© 2026 موقع احترافي - عبد العزيز قرينيك
</footer>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [
 {name:{ar:"فلتر زيت",fr:"Filtre",en:"Oil Filter"}, price:2000, img:"https://via.placeholder.com/300"},
 {name:{ar:"بطارية",fr:"Batterie",en:"Battery"}, price:12000, img:"https://via.placeholder.com/300"}
];

let cart=[]; let total=0;
let currentLang="ar";

/* عرض المنتجات */
function render(){
 let container=document.getElementById("products");
 container.innerHTML="";
 products.forEach((p,i)=>{
  container.innerHTML+=`
   <div class="card">
    <img src="${p.img}">
    <h3>${p.name[currentLang]}</h3>
    <p>${p.price} دج</p>
    <button onclick="add(${i})">+</button>
   </div>
  `;
 });
}
render();

/* سلة */
function add(i){
 cart.push(products[i]);
 total+=products[i].price;
 updateCart();
}

function updateCart(){
 let list=document.getElementById("cartItems");
 list.innerHTML="";
 cart.forEach(p=>{
  list.innerHTML+=`<li>${p.name[currentLang]}</li>`;
 });
 document.getElementById("total").innerText="المجموع: "+total+" دج";
}

function toggleCart(){
 let c=document.getElementById("cart");
 c.style.display=c.style.display=="block"?"none":"block";
}

/* إرسال */
function sendOrder(){
 let msg="طلب: "+cart.map(p=>p.name[currentLang]).join(", ")+" | "+total;
 window.open("https://wa.me/213663435686?text="+encodeURIComponent(msg));
 window.open("https://www.facebook.com/share/17DhVqMX9e/");
 alert("شكرا لطلبك 🎉");
}

/* Admin */
function adminLogin(){
 let pass=prompt("كلمة السر:");
 if(pass==="admin123"){
  let name=prompt("اسم المنتج:");
  let price=prompt("السعر:");
  let img=prompt("رابط الصورة:");
  products.push({
    name:{ar:name,fr:name,en:name},
    price:Number(price),
    img:img
  });
  localStorage.setItem("products",JSON.stringify(products));
  render();
 }else{
  alert("خطأ");
 }
}

/* لغات */
function changeLang(lang){
 currentLang=lang;
 render();
}
</script>

</body>
</html>
