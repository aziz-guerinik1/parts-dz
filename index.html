!<DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Auto Parts - عبد العزيز قرينيك</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #0f172a;
    color: white;
}

/* Header */
header {
    background: linear-gradient(90deg, #1e293b, #0ea5e9);
    padding: 20px;
    text-align: center;
    font-size: 24px;
}

/* Products */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #1e293b;
    border-radius: 15px;
    padding: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

img {
    width: 100%;
    border-radius: 10px;
}

/* Stars */
.stars span {
    cursor: pointer;
    font-size: 20px;
}

/* Cart */
.cart {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #0ea5e9;
    padding: 15px;
    border-radius: 50%;
    cursor: pointer;
}

.cart-box {
    position: fixed;
    right: 20px;
    bottom: 80px;
    background: #1e293b;
    padding: 20px;
    display: none;
}

/* Buttons */
button {
    background: #0ea5e9;
    border: none;
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
    color: white;
}
</style>
</head>

<body>

<header>
🚗 محل قطع غيار - عبد العزيز قرينيك  
<br> توصيل إلى جميع ولايات الوطن 🇩🇿
</header>

<div class="container">

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>فلتر زيت</h3>
<p>2000 دج</p>

<div class="stars" onclick="rate(this)">
<span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span>
</div>

<textarea placeholder="اكتب تعليق..."></textarea>

<button onclick="addToCart('فلتر زيت')">أضف للسلة</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>بطارية</h3>
<p>12000 دج</p>

<div class="stars" onclick="rate(this)">
<span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span>
</div>

<textarea placeholder="اكتب تعليق..."></textarea>

<button onclick="addToCart('بطارية')">أضف للسلة</button>
</div>

</div>

<!-- Cart -->
<div class="cart" onclick="toggleCart()">🛒</div>

<div class="cart-box" id="cartBox">
<h3>سلة المشتريات</h3>
<ul id="cartItems"></ul>

<button onclick="sendWhatsApp()">طلب عبر واتساب</button>
<button onclick="sendFacebook()">طلب عبر فايسبوك</button>
</div>

<script>
let cart = [];

function addToCart(product) {
    cart.push(product);
    alert("تمت الإضافة للسلة");
}

function toggleCart() {
    let box = document.getElementById("cartBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
}

function sendWhatsApp() {
    let msg = "طلب: " + cart.join(", ");
    window.open("https://wa.me/213663435686?text=" + encodeURIComponent(msg));
}

function sendFacebook() {
    window.open("https://www.facebook.com/share/17DhVqMX9e/");
}

function rate(starsDiv) {
    let stars = starsDiv.children;
    for (let i = 0; i < stars.length; i++) {
        stars[i].style.color = "gold";
    }
}
</script>

</body>
</html>
