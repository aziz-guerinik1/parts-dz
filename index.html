<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Auto Parts</title>

<style>
:root{
  --black:#0a0a0a;
  --gold:#d4af37;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--black);
  color:white;
}

header{
  padding:20px;
  text-align:center;
  color:var(--gold);
}

.lang{
  position:absolute;
  right:10px;
  top:10px;
}

.search{
  text-align:center;
  margin:10px;
}

.search input{
  padding:10px;
  width:60%;
}

/* Products */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#111;
  padding:15px;
  border:1px solid var(--gold);
  border-radius:10px;
}

img{width:100%;}

/* Cart */
.cart-btn{
  position:fixed;
  right:10px;
  top:50%;
  background:var(--gold);
  padding:15px;
  cursor:pointer;
}

.cart{
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:#111;
  display:none;
  padding:20px;
}

button{
  background:var(--gold);
  border:none;
  padding:10px;
  cursor:pointer;
  margin-top:10px;
}

footer{
  text-align:center;
  padding:20px;
  color:var(--gold);
}
</style>
</head>

<body>

<div class="lang">
<select onchange="changeLang(this.value)">
<option value="ar">AR</option>
<option value="fr">FR</option>
<option value="en">EN</option>
</select>
</div>

<header id="title"></header>

<div class="search">
<input type="text" id="searchInput" oninput="search()" placeholder="">
</div>

<div class="container" id="products"></div>

<div class="cart-btn" onclick="toggleCart()">🛒</div>

<div class="cart" id="cart">
<h3 id="cartTitle"></h3>
<ul id="cartItems"></ul>
<p id="total"></p>
<button onclick="sendOrder()" id="orderBtn"></button>
</div>

<footer id="footer"></footer>

<script>
let lang="ar";

/* ترجمة */
const T={
 ar:{
  title:"عبد العزيز قرينيك - محل قطع غيار | توصيل 58 ولاية",
  search:"ابحث عن منتج...",
  cart:"السلة",
  total:"المجموع",
  order:"إرسال الطلب",
  thanks:"شكرا لطلبك 🎉",
  footer:"© 2026 جميع الحقوق محفوظة"
 },
 fr:{
  title:"Abdelaziz - Pièces Auto | Livraison nationale",
  search:"Rechercher un produit...",
  cart:"Panier",
  total:"Total",
  order:"Envoyer",
  thanks:"Merci pour votre commande 🎉",
  footer:"© 2026 Tous droits réservés"
 },
 en:{
  title:"Auto Parts Store | Delivery Available",
  search:"Search product...",
  cart:"Cart",
  total:"Total",
  order:"Send Order",
  thanks:"Thank you 🎉",
  footer:"© 2026 All rights reserved"
 }
};

/* منتجات */
let products=[
 {name:{ar:"فلتر زيت",fr:"Filtre à huile",en:"Oil Filter"}, price:2000,img:"https://via.placeholder.com/300"},
 {name:{ar:"بطارية",fr:"Batterie",en:"Battery"}, price:12000,img:"https://via.placeholder.com/300"}
];

let cart=[]; let total=0;

/* عرض */
function render(list=products){
 let c=document.getElementById("products");
 c.innerHTML="";
 list.forEach((p,i)=>{
  c.innerHTML+=`
  <div class="card">
   <img src="${p.img}">
   <h3>${p.name[lang]}</h3>
   <p>${p.price} دج</p>
   <button onclick="add(${i})">+</button>
  </div>`;
 });
}

/* بحث */
function search(){
 let val=document.getElementById("searchInput").value.toLowerCase();
 let filtered=products.filter(p=>p.name[lang].toLowerCase().includes(val));
 render(filtered);
}

/* سلة */
function add(i){
 cart.push(products[i]);
 total+=products[i].price;
 updateCart();
}

function updateCart(){
 let list=document.getElementById("cartItems");
 list.innerHTML="";
 cart.forEach(p=>{
  list.innerHTML+=`<li>${p.name[lang]}</li>`;
 });
 document.getElementById("total").innerText=T[lang].total+": "+total+" دج";
}

function toggleCart(){
 let c=document.getElementById("cart");
 c.style.display=c.style.display=="block"?"none":"block";
}

/* إرسال */
function sendOrder(){
 let msg="طلب: "+cart.map(p=>p.name[lang]).join(", ")+" | "+total;
 window.open("https://wa.me/213663435686?text="+encodeURIComponent(msg));
 alert(T[lang].thanks);
}

/* تغيير لغة */
function changeLang(l){
 lang=l;
 document.getElementById("title").innerText=T[lang].title;
 document.getElementById("searchInput").placeholder=T[lang].search;
 document.getElementById("cartTitle").innerText=T[lang].cart;
 document.getElementById("orderBtn").innerText=T[lang].order;
 document.getElementById("footer").innerText=T[lang].footer;
 render();
 updateCart();
}

/* تشغيل */
changeLang("ar");
</script>

</body>
</html>
