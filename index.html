<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Parts - عبد العزيز قرينيك</title>

<style>
:root{
  --black:#0b0b0b;
  --gold:#d4af37;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--black);
  color:white;
}

/* Header */
header{
  background:linear-gradient(90deg, black, #1a1a1a);
  padding:20px;
  text-align:center;
  font-size:22px;
  color:var(--gold);
}

/* Language */
.lang{
  position:absolute;
  top:10px;
  right:10px;
}

/* Grid */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#111;
  border:1px solid var(--gold);
  border-radius:15px;
  padding:15px;
  transition:.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* Stars */
.stars span{
  cursor:pointer;
  font-size:20px;
}

/* Cart */
.cart{
  position:fixed;
  right:0;
  top:50%;
  background:var(--gold);
  padding:15px;
  cursor:pointer;
}

.cart-box{
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:#111;
  display:none;
  padding:20px;
  overflow:auto;
}

/* Buttons */
button{
  background:var(--gold);
  border:none;
  padding:10px;
  margin-top:10px;
  cursor:pointer;
}

/* Footer */
footer{
  text-align:center;
  padding:20px;
  border-top:1px solid var(--gold);
  color:var(--gold);
}
</style>
</head>

<body>

<div class="lang">
<select onchange="changeLang(this.value)">
<option value="ar">AR</option>
<option value="fr">FR</option>
<option value="en">EN</option>
</select>
</div>

<header id="title">
🚗 محل قطع غيار - عبد العزيز قرينيك
<br> توصيل إلى جميع ولايات الوطن 🇩🇿
</header>

<div class="container">

<div class="card">
<img src="https://via.placeholder.com/300">
<h3 data-key="oil">فلتر زيت</h3>
<p>2000 دج</p>

<div class="stars" onclick="rate(this)">
<span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span>
</div>

<textarea placeholder="تعليق"></textarea>
<button onclick="addToCart('فلتر زيت',2000)">أضف</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3 data-key="battery">بطارية</h3>
<p>12000 دج</p>

<div class="stars" onclick="rate(this)">
<span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span>
</div>

<textarea placeholder="تعليق"></textarea>
<button onclick="addToCart('بطارية',12000)">أضف</button>
</div>

</div>

<div class="cart" onclick="toggleCart()">🛒</div>

<div class="cart-box" id="cartBox">
<h3 id="cartTitle">السلة</h3>
<ul id="items"></ul>
<p id="total"></p>

<button onclick="sendWhatsApp()">واتساب</button>
<button onclick="sendFacebook()">فايسبوك</button>
</div>

<footer id="footer">
© 2026 جميع الحقوق محفوظة - عبد العزيز قرينيك
</footer>

<script>
let cart=[];
let total=0;

/* Cart */
function addToCart(name,price){
  cart.push(name);
  total+=price;
  renderCart();
}

function renderCart(){
  let list=document.getElementById("items");
  list.innerHTML="";
  cart.forEach(i=>{
    let li=document.createElement("li");
    li.textContent=i;
    list.appendChild(li);
  });
  document.getElementById("total").innerText="المجموع: "+total+" دج";
}

function toggleCart(){
  let box=document.getElementById("cartBox");
  box.style.display=box.style.display==="block"?"none":"block";
}

/* Send */
function sendWhatsApp(){
  let msg="طلب: "+cart.join(", ")+" | المجموع: "+total;
  window.open("https://wa.me/213663435686?text="+encodeURIComponent(msg));
}

function sendFacebook(){
  window.open("https://www.facebook.com/share/17DhVqMX9e/");
}

/* Rating */
function rate(div){
  let stars=div.children;
  for(let i=0;i<stars.length;i++){
    stars[i].style.color="gold";
  }
}

/* Admin (simple) */
function adminLogin(){
  let pass=prompt("كلمة السر:");
  if(pass==="1234"){
    alert("مرحبا بالإدارة");
  }else{
    alert("خطأ");
  }
}

/* Language */
const translations={
  ar:{oil:"فلتر زيت",battery:"بطارية"},
  fr:{oil:"Filtre à huile",battery:"Batterie"},
  en:{oil:"Oil Filter",battery:"Battery"}
};

function changeLang(lang){
  document.querySelectorAll("[data-key]").forEach(el=>{
    el.textContent=translations[lang][el.dataset.key];
  });
}
</script>

</body>
</html>
