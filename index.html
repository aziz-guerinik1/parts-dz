<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGA 2026 | متجر عبد العزيز</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        :root { --gold: #d4af37; --dark: #0a0a0a; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark); color: white; margin: 0; }
        .gold-text { color: var(--gold); }
        .gold-bg { background-color: var(--gold); color: black; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 20px; transition: 0.4s; overflow: hidden; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .admin-panel { border: 2px dashed var(--gold); background: #111; border-radius: 25px; padding: 25px; margin: 40px 0; }
        .cart-modal { background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <nav class="p-5 border-b border-gray-800 flex justify-between items-center sticky top-0 bg-black/80 z-50">
        <div class="flex items-center gap-3">
            <span class="gold-bg px-3 py-1 rounded font-bold">AGA</span>
            <h1 id="navTitle" class="text-xl font-bold">محل عبد العزيز لقطع الغيار</h1>
        </div>
        <div class="flex items-center gap-4">
            <select id="langSelect" onchange="changeLang()" class="bg-gray-900 border border-gray-700 text-white p-1 rounded">
                <option value="ar">العربية</option>
                <option value="fr">Français</option>
            </select>
            <div class="relative cursor-pointer" onclick="toggleCart()">
                <i class="fas fa-shopping-bag text-2xl gold-text"></i>
                <span id="cartCount" class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] px-1.5 rounded-full">0</span>
            </div>
        </div>
    </nav>

    <header class="py-12 px-4 text-center">
        <h2 id="heroTitle" class="text-3xl font-bold mb-6">ابحث عن قطعة غيارك الأصلية</h2>
        <div class="max-w-2xl mx-auto relative">
            <input type="text" id="searchInput" onkeyup="search()" placeholder="ماذا تحتاج اليوم؟..." class="w-full p-4 rounded-full bg-gray-900 border border-gray-700 outline-none focus:border-gold-500 transition">
        </div>
    </header>

    <main class="container mx-auto p-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="productGrid"></main>

    <section class="container mx-auto p-4">
        <div class="admin-panel shadow-2xl">
            <h3 id="adminTitle" class="text-xl font-bold mb-6 gold-text flex items-center gap-2"><i class="fas fa-user-shield"></i> لوحة تحكم المدير</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-4">
                    <input type="text" id="pName" placeholder="اسم المنتج" class="w-full p-3 bg-black border border-gray-800 rounded-lg">
                    <input type="number" id="pPrice" placeholder="السعر (DA)" class="w-full p-3 bg-black border border-gray-800 rounded-lg">
                    <div class="p-4 border border-gray-800 rounded-lg text-center">
                        <label id="imgLabel" class="block text-sm mb-2 text-gray-500">اختر 3 صور للمنتج:</label>
                        <input type="file" id="pImgs" multiple accept="image/*" class="text-xs">
                    </div>
                    <button onclick="addProduct()" id="addBtn" class="w-full gold-bg p-4 rounded-lg font-bold hover:opacity-90 transition">إضافة المنتج للموقع</button>
                </div>
                <div class="bg-black p-4 rounded-lg border border-gray-800 overflow-y-auto max-h-64" id="adminList"></div>
            </div>
        </div>
    </section>

    <div id="cartModal" class="fixed inset-0 cart-modal hidden z-[100] flex justify-end p-4">
        <div class="w-full max-w-md bg-zinc-900 h-full p-6 shadow-2xl rounded-3xl flex flex-col border border-gray-800">
            <h2 id="cartTitle" class="text-2xl font-bold mb-6 border-b border-gray-800 pb-4">سلة المقتنيات الاحترافية</h2>
            <div id="cartItems" class="flex-1 overflow-y-auto space-y-4 mb-6"></div>
            <div class="border-t border-gray-800 pt-4">
                <div class="flex justify-between text-xl font-bold mb-6">
                    <span id="totalLabel">الإجمالي:</span>
                    <span class="gold-text"><span id="totalPrice">0</span> DA</span>
                </div>
                <div class="space-y-3 mb-6">
                    <input type="text" id="uName" placeholder="الاسم الكامل" class="w-full p-3 bg-black border border-gray-700 rounded-lg outline-none">
                    <input type="tel" id="uPhone" placeholder="رقم الهاتف" class="w-full p-3 bg-black border border-gray-700 rounded-lg outline-none">
                    <input type="text" id="uLoc" placeholder="الولاية والبلدية" class="w-full p-3 bg-black border border-gray-700 rounded-lg outline-none">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="sendOrder('wa')" class="bg-green-600 p-4 rounded-xl font-bold flex items-center justify-center gap-2"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                    <button onclick="sendOrder('fb')" class="bg-blue-600 p-4 rounded-xl font-bold flex items-center justify-center gap-2"><i class="fab fa-facebook-messenger"></i> Facebook</button>
                </div>
                <button onclick="toggleCart()" class="w-full mt-4 text-gray-500 underline text-sm">إغلاق</button>
            </div>
        </div>
    </div>

    <footer class="bg-black py-16 mt-20 border-t border-gray-900 text-center">
        <h2 class="gold-text font-bold text-2xl mb-4">AGA - عبد العزيز لقطع الغيار</h2>
        <p id="footerText" class="text-gray-500 max-w-md mx-auto text-sm px-4">نحن نوفر لكم أجود قطع الغيار الأصلية مع خدمة توصيل سريعة لجميع الولايات. ثقتكم هي هدفنا.</p>
        <div class="mt-8 text-gray-700 text-[10px] tracking-widest uppercase italic">تصميم احترافي مبهر © 2026 - ابن صاحب الموقع</div>
    </footer>

    <script>
        let products = JSON.parse(localStorage.getItem('aga_2026_v1')) || [];
        let cart = [];
        let currentLang = 'ar';

        const translations = {
            ar: { nav: "محل عبد العزيز لقطع الغيار", hero: "ابحث عن قطعة غيارك الأصلية", search: "ماذا تحتاج اليوم؟...", admin: "لوحة تحكم المدير", add: "إضافة المنتج للموقع", pName: "اسم المنتج", pPrice: "السعر (DA)", imgL: "اختر 3 صور للمنتج:", cartT: "سلة المقتنيات الاحترافية", totalL: "الإجمالي:", uName: "الاسم الكامل", uPhone: "رقم الهاتف", uLoc: "الولاية والبلدية", footer: "نحن نوفر لكم أجود قطع الغيار الأصلية مع خدمة توصيل سريعة لجميع الولايات. ثقتكم هي هدفنا.", addToCart: "إضافة للسلة", del: "حذف", edit: "تعديل السعر" },
            fr: { nav: "Ets Aziz Pièces Auto", hero: "Trouvez vos pièces d'origine", search: "Chercher ici...", admin: "Panel d'administration", add: "Ajouter le produit", pName: "Nom du produit", pPrice: "Prix (DA)", imgL: "Choisir 3 photos:", cartT: "Panier d'achat Pro", totalL: "Total:", uName: "Nom Complet", uPhone: "N° Téléphone", uLoc: "Wilaya et Commune", footer: "Qualité originale et livraison rapide dans toutes les wilayas. Votre confiance est notre priorité.", addToCart: "Ajouter au panier", del: "Supprimer", edit: "Modifier Prix" }
        };

        function changeLang() {
            currentLang = document.getElementById('langSelect').value;
            const t = translations[currentLang];
            document.getElementById('mainHtml').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('navTitle').innerText = t.nav;
            document.getElementById('heroTitle').innerText = t.hero;
            document.getElementById('searchInput').placeholder = t.search;
            document.getElementById('adminTitle').innerHTML = `<i class="fas fa-user-shield"></i> ` + t.admin;
            document.getElementById('addBtn').innerText = t.add;
            document.getElementById('pName').placeholder = t.pName;
            document.getElementById('pPrice').placeholder = t.pPrice;
            document.getElementById('imgLabel').innerText = t.imgL;
            document.getElementById('cartTitle').innerText = t.cartT;
            document.getElementById('totalLabel').innerText = t.totalL;
            document.getElementById('uName').placeholder = t.uName;
            document.getElementById('uPhone').placeholder = t.uPhone;
            document.getElementById('uLoc').placeholder = t.uLoc;
            document.getElementById('footerText').innerText = t.footer;
            renderProducts();
        }

        async function addProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const files = document.getElementById('pImgs').files;
            if(!name || !price || files.length === 0) return alert("يرجى ملء كافة البيانات!");
            
            let imgs = [];
            for(let f of files) imgs.push(await toBase64(f));
            
            products.push({ id: Date.now(), name, price, imgs });
            localStorage.setItem('aga_2026_v1', JSON.stringify(products));
            location.reload();
        }

        const toBase64 = f => new Promise(res => { const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result); });

        function renderProducts(data = products) {
            const t = translations[currentLang];
            document.getElementById('productGrid').innerHTML = data.map(p => `
                <div class="card shadow-2xl">
                    <img src="${p.imgs[0]}" class="w-full h-56 object-cover border-b border-gray-800 cursor-pointer" onclick="viewImgs(${p.id})">
                    <div class="p-5">
                        <h3 class="font-bold text-lg mb-2">${p.name}</h3>
                        <p class="gold-text font-bold text-xl mb-6">${p.price} DA</p>
                        <button onclick="addToCart(${p.id})" class="w-full border border-gold-500 py-3 rounded-xl font-bold hover:gold-bg transition uppercase text-xs tracking-widest">
                            <i class="fas fa-cart-plus"></i> ${t.addToCart}
                        </button>
                    </div>
                </div>
            `).join('');

            document.getElementById('adminList').innerHTML = products.map(p => `
                <div class="flex justify-between items-center bg-zinc-900 p-3 rounded-lg mb-2 border border-gray-800">
                    <span class="text-xs font-bold truncate w-24">${p.name}</span>
                    <div class="flex gap-4">
                        <button onclick="editPrice(${p.id})" class="text-blue-400 text-xs underline">${t.edit}</button>
                        <button onclick="delProduct(${p.id})" class="text-red-500 text-xs underline">${t.del}</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) { cart.push(products.find(p => p.id === id)); updateCart(); }
        function updateCart() {
            document.getElementById('cartCount').innerText = cart.length;
            document.getElementById('cartItems').innerHTML = cart.map((p, i) => `
                <div class="flex items-center gap-4 bg-black p-4 rounded-xl border border-gray-800">
                    <img src="${p.imgs[0]}" class="w-16 h-16 rounded-lg object-cover">
                    <div class="flex-1">
                        <p class="font-bold text-sm">${p.name}</p>
                        <p class="gold-text font-bold text-xs">${p.price} DA</p>
                    </div>
                    <button onclick="removeFromCart(${i})" class="text-red-500"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
            document.getElementById('totalPrice').innerText = cart.reduce((a, b) => a + parseFloat(b.price), 0);
        }

        function removeFromCart(i) { cart.splice(i, 1); updateCart(); }
        function toggleCart() { document.getElementById('cartModal').classList.toggle('hidden'); }
        function delProduct(id) { products = products.filter(p => p.id !== id); localStorage.setItem('aga_2026_v1', JSON.stringify(products)); renderProducts(); }
        function editPrice(id) { const p = products.find(x => x.id === id); const newPrice = prompt("أدخل السعر الجديد:", p.price); if(newPrice) { p.price = newPrice; localStorage.setItem('aga_2026_v1', JSON.stringify(products)); renderProducts(); } }
        function search() { const q = document.getElementById('searchInput').value.toLowerCase(); renderProducts(products.filter(p => p.name.toLowerCase().includes(q))); }

        function sendOrder(type) {
            const name = document.getElementById('uName').value, phone = document.getElementById('uPhone').value, loc = document.getElementById('uLoc').value;
            if(!name || !phone || cart.length === 0) return alert("يرجى إكمال بيانات الطلب!");
            let msg = `🛒 *طلب جديد من متجر AGA*%0A👤 *الزبون:* ${name}%0A📞 *الهاتف:* ${phone}%0A📍 *العنوان:* ${loc}%0A%0A*الطلبات:*%0A` + cart.map(x => `• ${x.name} (${x.price} DA)`).join('%0A');
            msg += `%0A%0A💰 *الإجمالي:* ${document.getElementById('totalPrice').innerText} DA`;
            window.open(type === 'wa' ? `https://wa.me/213663435686?text=${msg}` : `https://www.facebook.com/share/17DhVqMX9e/`);
        }

        window.onload = () => { changeLang(); };
    </script>
</body>
</html>
